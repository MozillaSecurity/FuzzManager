repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: meta
    hooks:
      - id: check-useless-excludes
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ["--ignore-words-list=buildd,swith"]
        exclude_types: [json]
        exclude: ^FTB/Signatures/tests/fixtures/
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd server/frontend && npm run lint'
        language: system
        files: ^server/frontend/.*\.(js|mjs|cjs|vue)$
        stages: [ pre-commit ]
