[tox]
envlist = py{310,311,312,313,314}
minversion = 4.0
skip_missing_interpreters = true

[testenv]
# Use tox-uv plugin for lockfile-based testing
# Install with: pip install tox-uv
runner = uv-venv-lock-runner
extras =
    server
    ec2spotmanager
    taskmanager
    test
commands = pytest -v --cov="{toxinidir}" --cov-report term-missing --cov-report xml {posargs}
passenv =
    TOXENV
    CI

[testenv:py{312,313,314}]
runner = uv-venv-lock-runner
extras =
    test

[testenv:update-lock]
skip_install = true
basepython = python3.10
commands =
    uv lock --upgrade
description = Update uv.lock file

[flake8]
# E203, W503, and W504 are all black compat
ignore =
    E203
    W503
enable =
    W504
max-line-length = 88
show-source = true
