    { name = "djangorestframework", marker = "extra == 'server'", specifier = "~=3.15.1" },
    { name = "fakeredis", marker = "python_full_version < '3.12' and extra == 'test'", specifier = ">=2.20.0" },
    { name = "fasteners", specifier = ">=0.14.1" },
    { name = "fuzzing-decision", marker = "extra == 'taskmanager'", git = "https://github.com/MozillaSecurity/orion?subdirectory=services%2Ffuzzing-decision" },
    { name = "gunicorn", marker = "extra == 'docker'", specifier = "~=23.0.0" },
    { name = "kombu", marker = "extra == 'taskmanager'" },
    { name = "laniakea", marker = "extra == 'ec2spotmanager'" },
    { name = "mercurial", marker = "extra == 'docker'" },
